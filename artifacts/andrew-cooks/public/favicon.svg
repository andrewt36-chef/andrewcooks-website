<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="13" fill="#1c1c1c"/>

  <!-- Toque puff (top bubble) -->
  <ellipse cx="32" cy="24" rx="17" ry="14" fill="#f5f0ea"/>

  <!-- Toque cylinder body -->
  <rect x="16" y="31" width="32" height="14" fill="#f5f0ea"/>

  <!-- Pleat lines on cylinder -->
  <line x1="24" y1="31" x2="24" y2="45" stroke="#d8cfc4" stroke-width="1.2"/>
  <line x1="32" y1="31" x2="32" y2="45" stroke="#d8cfc4" stroke-width="1.2"/>
  <line x1="40" y1="31" x2="40" y2="45" stroke="#d8cfc4" stroke-width="1.2"/>

  <!-- Magenta pink band/brim -->
  <rect x="13" y="43" width="38" height="7" rx="3.5" fill="#b01d6a"/>

  <!-- Subtle highlight on puff -->
  <ellipse cx="25" cy="19" rx="7" ry="5" fill="white" opacity="0.25"/>
</svg>
