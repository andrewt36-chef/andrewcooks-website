kind = "web"
previewPath = "/"
title = "Andrew Cooks - Private Chef"
version = "1.0.0"
id = "artifacts/andrew-cooks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19781

[services.development]
run = "pnpm --filter @workspace/andrew-cooks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/andrew-cooks", "run", "build" ]
publicDir = "artifacts/andrew-cooks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19781"
BASE_PATH = "/"
